name: Deploy to escalate-map.kineticgain.com

# Node/Vite/React -> Hostinger FTP at /escalate-map/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-board-decision-escalation-map
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build + FTP-sync to escalate-map.kineticgain.com
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: |
          if npm run | grep -q "^  prerender$"; then
            npm run prerender
          else
            npm run build
          fi

      - name: Verify build output
        run: |
          if [ -d "site" ]; then DEPLOY_DIR="site"
          elif [ -d "dist" ]; then DEPLOY_DIR="dist"
          elif [ -d "build" ]; then DEPLOY_DIR="build"
          else
            echo "FAIL: no site/, dist/, or build/ produced"
            exit 1
          fi
          echo "DEPLOY_DIR=$DEPLOY_DIR" >> $GITHUB_ENV
          test -f "$DEPLOY_DIR/index.html" || (echo "FAIL: $DEPLOY_DIR/index.html missing" && exit 1)
          grep -q "Product depth" "$DEPLOY_DIR/index.html" || (echo "FAIL: missing Product depth marker" && exit 1)
          grep -q "What these repos have in common" "$DEPLOY_DIR/index.html" || (echo "FAIL: missing shared pattern marker" && exit 1)
          grep -q "portfolio.kineticgain.com" "$DEPLOY_DIR/index.html" || (echo "FAIL: missing portfolio wayfinding marker" && exit 1)

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./${{ env.DEPLOY_DIR }}/
          server-dir: /escalate-map/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
